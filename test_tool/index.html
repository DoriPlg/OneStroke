<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoodleResNet Predictor Test</title>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #9d4edd;
            --primary-hover: #7b2cbf;
            --text: #ffffff;
            --text-secondary: #aaaaaa;
            --border: #333333;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            display: flex;
            gap: 2rem;
            max-width: 1000px;
            width: 100%;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                align-items: center;
            }
        }

        .panel {
            background-color: var(--surface);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            flex: 1;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 1rem;
            font-size: 1.25rem;
            font-weight: 600;
        }

        #canvas-container {
            border: 2px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            background-color: #ffffff; /* White background for drawing */
            width: fit-content;
            margin: 0 auto 1.5rem auto;
            position: relative;
        }

        canvas {
            display: block;
            touch-action: none;
            cursor: crosshair;
        }

        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        button {
            background-color: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background-color: #2a2a2a;
        }

        button.primary {
            background-color: var(--primary);
            border-color: var(--primary);
        }

        button.primary:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
        }

        #results-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .result-item {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .result-label {
            width: 120px;
            text-align: right;
            font-weight: 500;
            text-transform: capitalize;
        }

        .result-bar-container {
            flex: 1;
            height: 12px;
            background-color: var(--bg);
            border-radius: 6px;
            overflow: hidden;
        }

        .result-bar {
            height: 100%;
            background-color: var(--primary);
            border-radius: 6px;
            transition: width 0.3s ease-out;
            width: 0%;
        }

        .result-item:first-child .result-bar {
            background-color: #00b4d8; /* Highlight the top prediction */
        }

        .result-item:first-child .result-label {
            color: #00b4d8;
            font-weight: 700;
        }

        .result-prob {
            width: 60px;
            text-align: left;
            font-variant-numeric: tabular-nums;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .status {
            text-align: center;
            margin-top: 1rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            min-height: 1.5em;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h2>Draw a Doodle</h2>
        <div id="canvas-container">
            <canvas id="doodle-canvas" width="400" height="400"></canvas>
        </div>
        <div class="controls">
            <button id="btn-clear">Clear</button>
            <button id="btn-predict" class="primary">Predict</button>
        </div>
        <div id="status" class="status">Draw something and click Predict!</div>
    </div>

    <div class="panel">
        <h2>Top 10 Predictions</h2>
        <ul id="results-list">
            <!-- Results will be injected here -->
            <li class="status" style="margin-top: 2rem;">Waiting for prediction...</li>
        </ul>
    </div>
</div>

<script>
    const canvas = document.getElementById('doodle-canvas');
    const ctx = canvas.getContext('2d');
    const btnClear = document.getElementById('btn-clear');
    const btnPredict = document.getElementById('btn-predict');
    const statusEl = document.getElementById('status');
    const resultsList = document.getElementById('results-list');

    // Set up canvas default bounds
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.lineWidth = 15; // Thick stroke mimicking the game
    ctx.strokeStyle = '#000000'; // Black strokes on white bg

    let isDrawing = false;
    let lastX = 0;
    let lastY = 0;

    function startDrawing(e) {
        isDrawing = true;
        const pos = getMousePos(e);
        lastX = pos.x;
        lastY = pos.y;
        
        // Draw a single dot if just clicked
        ctx.beginPath();
        ctx.arc(lastX, lastY, ctx.lineWidth / 2, 0, Math.PI * 2);
        ctx.fill();
    }

    function draw(e) {
        if (!isDrawing) return;
        e.preventDefault();
        
        const pos = getMousePos(e);
        
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        
        lastX = pos.x;
        lastY = pos.y;
    }

    function stopDrawing() {
        isDrawing = false;
    }

    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        
        // Handle both mouse and touch events
        let clientX = e.clientX;
        let clientY = e.clientY;
        
        if (e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        }

        return {
            x: ((clientX - rect.left) / rect.width) * canvas.width,
            y: ((clientY - rect.top) / rect.height) * canvas.height
        };
    }

    // Event listeners
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseout', stopDrawing);

    canvas.addEventListener('touchstart', startDrawing, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', stopDrawing);

    btnClear.addEventListener('click', () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        resultsList.innerHTML = '<li class="status" style="margin-top: 2rem;">Waiting for prediction...</li>';
        statusEl.textContent = 'Draw something and click Predict!';
    });

    btnPredict.addEventListener('click', async () => {
        const imageData = canvas.toDataURL('image/png');
        
        // Disable button while processing
        btnPredict.disabled = true;
        btnPredict.textContent = 'Predicting...';
        statusEl.textContent = 'Sending to model...';
        
        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ image: imageData })
            });
            
            const data = await response.json();
            
            if (data.success && data.predictions) {
                renderResults(data.predictions);
                statusEl.textContent = 'Prediction complete!';
            } else {
                statusEl.textContent = 'Error: ' + (data.error || 'Unknown error');
                console.error(data);
            }
        } catch (error) {
            statusEl.textContent = 'Network error occurred.';
            console.error('Prediction error:', error);
        } finally {
            btnPredict.disabled = false;
            btnPredict.textContent = 'Predict';
        }
    });

    function renderResults(predictions) {
        resultsList.innerHTML = '';
        
        predictions.forEach(pred => {
            const percent = (pred.probability * 100);
            
            const li = document.createElement('li');
            li.className = 'result-item';
            
            li.innerHTML = `
                <div class="result-label" title="${pred.label}">${pred.label}</div>
                <div class="result-bar-container">
                    <div class="result-bar" style="width: ${percent.toFixed(2)}%"></div>
                </div>
                <div class="result-prob">${percent.toFixed(1)}%</div>
            `;
            
            resultsList.appendChild(li);
        });
    }
</script>
</body>
</html>
